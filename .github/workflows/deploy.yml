name: Fly Deploy - Fix Lockfile with PAT

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Fly.io (lockfile fix + PAT)
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-group
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (updates lockfile)
        run: npm install

      - name: Commit updated package-lock.json
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add package-lock.json
          git commit -m "chore: update package-lock.json after adding @xenova/transformers" || echo "No changes to commit"
          git push

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy app
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          
