name: Force Add Huggingface Transformers

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Clean npm cache & uninstall any old transformers
        run: |
          npm cache clean --force
          npm uninstall @xenova/transformers @huggingface/transformers || true

      - name: Force install latest transformers
        run: |
          npm install @huggingface/transformers@latest --save --force --legacy-peer-deps
          echo "=== package.json after install ==="
          cat package.json | grep transformers || echo "No transformers line found!"

      - name: Commit if changed
        run: |
          git config --global user.name "OpenClaw Bot"
          git config --global user.email "bot@openclaw.com"
          git add package.json package-lock.json
          git diff --quiet && git diff --staged --quiet && echo "No changes detected" || git commit -m "chore(deps): force add @huggingface/transformers for semantic recall"
          git push origin HEAD:main || echo "Push complete or already up-to-date"
