name: Force Add Huggingface Transformers

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Debug current package.json
        run: cat package.json

      - name: Force install transformers
        run: |
          npm install @huggingface/transformers@latest --save --force --legacy-peer-deps
          echo "Install complete - checking package.json"
          grep transformers package.json || echo "No transformers in package.json!"

      - name: Commit if changed
        run: |
          git config --global user.name "OpenClaw Bot"
          git config --global user.email "bot@openclaw.com"
          git add package.json package-lock.json
          git diff --quiet && git diff --staged --quiet && echo "No changes" || git commit -m "chore(deps): force add @huggingface/transformers for semantic recall"
          git push origin HEAD:main || echo "Push complete or already up-to-date"
          
